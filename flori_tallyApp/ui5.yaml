specVersion: "4.0"
metadata:
  name: app.tallyapp
type: application

server:
  customMiddleware:

    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: true
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
        backend:
          - path: /token
            url: http://localhost:3002
          - path: /api
            url: http://localhost:3003
          - path: /odata
            url: http://localhost:3003

    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300

    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon